excludePatterns:
  # Test fixtures contain intentionally dead code that exists to drive
  # the auditor's own reachability tests; auditing them as part of the
  # outer package would always fail the gate.
  - "**/Tests/UnreachableCodeAuditorTests/Fixtures/**"

docTarget: QualityGateCore

build:
  solverExpressionTimeThreshold: 500

dependencyAudit:
  allowBranchPins:
    - indexstore-db
    - swift-lmdb

consistency:
  corpusPath: /Users/jpurnell/Dropbox/Computer/Development/Swift/Tools/org-judgement-corpus
  projectID: quality-gate-swift
  consistencyThreshold: 0.7
  defaultRiskTier: 2
