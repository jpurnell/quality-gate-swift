excludePatterns:
  # Test fixtures contain intentionally dead code that exists to drive
  # the auditor's own reachability tests; auditing them as part of the
  # outer package would always fail the gate.
  - "**/Tests/UnreachableCodeAuditorTests/Fixtures/**"

docTarget: QualityGateCore

build:
  solverExpressionTimeThreshold: 500

logging:
  projectType: cli

security:
  # CLI tool operates on configured paths (not user input) and spawns
  # hardcoded system processes — path-traversal, command-injection, and
  # insecure-transport are false positives in this context.
  enabledRules:
    - security.hardcoded-secret
    - security.weak-crypto
    - security.eval-js
    - security.sql-injection
    - security.insecure-keychain
    - security.tls-disabled
    - security.ssrf

dependencyAudit:
  allowBranchPins:
    - indexstore-db
    - swift-lmdb

consistency:
  corpusPath: /Users/jpurnell/Dropbox/Computer/Development/Swift/Tools/org-judgement-corpus
  projectID: quality-gate-swift
  consistencyThreshold: 0.7
  defaultRiskTier: 2

ijs:
  projectID: "quality-gate-swift"
  corpusPath: "/Users/jpurnell/Dropbox/Computer/Development/Swift/Tools/org-judgement-corpus"
  decisionOwner: "jpurnell"
  defaultRiskTier: 2
  remoteURL: "git@github.com:jpurnell/org-judgement-corpus.git"
