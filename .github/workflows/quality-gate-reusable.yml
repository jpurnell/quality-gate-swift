name: Quality Gate (Reusable)

# Reusable workflow for any project using quality-gate-swift.
# Always builds from latest main — improvements propagate automatically.
#
# Basic usage (run default checkers):
#
#   jobs:
#     quality-gate:
#       uses: jpurnell/quality-gate-swift/.github/workflows/quality-gate-reusable.yml@main
#
# Daily audit with telemetry (run all checkers, push to corpus):
#
#   on:
#     schedule:
#       - cron: '0 6 * * *'
#     push:
#       branches: [main]
#
#   jobs:
#     quality-gate:
#       uses: jpurnell/quality-gate-swift/.github/workflows/quality-gate-reusable.yml@main
#       with:
#         checks: "all"
#         continue-on-failure: true
#         corpus-repo: jpurnell/org-judgement-corpus
#       secrets:
#         corpus-token: ${{ secrets.CORPUS_PUSH_TOKEN }}

on:
  workflow_call:
    inputs:
      checks:
        description: "Space-separated checker IDs to run ('all' for every checker)"
        type: string
        required: false
        default: ""
      exclude:
        description: "Space-separated checker IDs to skip (used with checks: 'all')"
        type: string
        required: false
        default: ""
      continue-on-failure:
        description: "Continue running checks even if one fails"
        type: boolean
        required: false
        default: false
      strict:
        description: "Treat warnings as failures (exit code 1)"
        type: boolean
        required: false
        default: false
      config:
        description: "Path to .quality-gate.yml (relative to project root)"
        type: string
        required: false
        default: ".quality-gate.yml"
      corpus-repo:
        description: "GitHub repository for the IJS corpus (e.g., jpurnell/org-judgement-corpus)"
        type: string
        required: false
        default: ""
      corpus-branch:
        description: "Branch in the corpus repo to push telemetry to"
        type: string
        required: false
        default: "main"
    secrets:
      corpus-token:
        description: "PAT with push access to corpus repo"
        required: false

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: macos-latest
    env:
      CI: "true"
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Cache quality-gate binary
        id: qg-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/quality-gate
          key: quality-gate-swift62-${{ runner.os }}-${{ hashFiles('.github/workflows/*.yml') }}

      - name: Configure git auth for private dependencies
        if: steps.qg-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.corpus-token }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Build quality-gate from latest main
        if: steps.qg-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/jpurnell/quality-gate-swift.git /tmp/quality-gate-swift
          cd /tmp/quality-gate-swift
          swift build -c release 2>&1 | tail -5
          cp .build/release/quality-gate /usr/local/bin/
          echo "quality-gate built from $(git rev-parse --short HEAD)"

      - name: Checkout corpus
        if: inputs.corpus-repo != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.corpus-repo }}
          ref: ${{ inputs.corpus-branch }}
          token: ${{ secrets.corpus-token }}
          path: _corpus

      - name: Run quality gate
        id: qg-run
        run: |
          ARGS=""

          if [ -n "${{ inputs.checks }}" ]; then
            for check in ${{ inputs.checks }}; do
              ARGS="$ARGS --check $check"
            done
          fi

          if [ -n "${{ inputs.exclude }}" ]; then
            for exc in ${{ inputs.exclude }}; do
              ARGS="$ARGS --exclude $exc"
            done
          fi

          if [ -f "${{ inputs.config }}" ]; then
            ARGS="$ARGS --config ${{ inputs.config }}"
          fi

          if [ "${{ inputs.continue-on-failure }}" = "true" ]; then
            ARGS="$ARGS --continue-on-failure"
          fi

          if [ "${{ inputs.strict }}" = "true" ]; then
            ARGS="$ARGS --strict"
          fi

          # Write telemetry directly to corpus checkout if available
          if [ -d "_corpus" ]; then
            ARGS="$ARGS --telemetry-corpus-path $(pwd)/_corpus"
          fi

          echo "Running: quality-gate $ARGS"
          quality-gate $ARGS || echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Push telemetry to corpus
        if: inputs.corpus-repo != '' && always()
        working-directory: _corpus
        run: |
          git config user.name "quality-gate[bot]"
          git config user.email "quality-gate[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No telemetry changes to commit."
            exit 0
          fi

          COMMIT_MSG="telemetry: ${{ github.repository }}@$(echo ${{ github.sha }} | cut -c1-7)"

          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            git commit -m "$COMMIT_MSG" || true
            if git push origin ${{ inputs.corpus-branch }}; then
              echo "Telemetry pushed successfully (attempt $attempt)."
              exit 0
            fi
            echo "Push conflict (attempt $attempt/$MAX_RETRIES), rebasing..."
            git pull --rebase origin ${{ inputs.corpus-branch }}
          done

          echo "::warning::Telemetry push failed after $MAX_RETRIES attempts."
          exit 0
