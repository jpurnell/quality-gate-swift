name: Quality Gate (Reusable)

# Reusable workflow for any project using quality-gate-swift.
# Always builds from latest main — improvements propagate automatically.
#
# Basic usage (run default checkers):
#
#   jobs:
#     quality-gate:
#       uses: jpurnell/quality-gate-swift/.github/workflows/quality-gate-reusable.yml@main
#
# Daily audit with telemetry (run all checkers, push to corpus):
#
#   on:
#     schedule:
#       - cron: '0 6 * * *'
#     push:
#       branches: [main]
#
#   jobs:
#     quality-gate:
#       uses: jpurnell/quality-gate-swift/.github/workflows/quality-gate-reusable.yml@main
#       with:
#         checks: "all"
#         continue-on-failure: true
#         corpus-repo: jpurnell/org-judgement-corpus
#       secrets:
#         corpus-token: ${{ secrets.CORPUS_PUSH_TOKEN }}

on:
  workflow_call:
    inputs:
      checks:
        description: "Space-separated checker IDs to run ('all' for every checker)"
        type: string
        required: false
        default: ""
      exclude:
        description: "Space-separated checker IDs to skip (used with checks: 'all')"
        type: string
        required: false
        default: ""
      continue-on-failure:
        description: "Continue running checks even if one fails"
        type: boolean
        required: false
        default: false
      strict:
        description: "Treat warnings as failures (exit code 1)"
        type: boolean
        required: false
        default: false
      config:
        description: "Path to .quality-gate.yml (relative to project root)"
        type: string
        required: false
        default: ".quality-gate.yml"
      corpus-repo:
        description: "GitHub repository for the IJS corpus (e.g., jpurnell/org-judgement-corpus)"
        type: string
        required: false
        default: ""
      corpus-branch:
        description: "Branch in the corpus repo to push telemetry to"
        type: string
        required: false
        default: "main"
    secrets:
      corpus-token:
        description: "PAT with push access to corpus repo"
        required: false

permissions:
  contents: read
  issues: write

jobs:
  quality-gate:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CI: "true"
    steps:
      - name: Checkout project
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install Swift 6.2
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2.4.0
        with:
          swift-version: '6.2'

      - name: Cache quality-gate binary
        id: qg-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /usr/local/bin/quality-gate
          key: quality-gate-swift62-${{ runner.os }}-${{ hashFiles('.github/workflows/*.yml') }}

      - name: Configure git auth for private dependencies
        if: steps.qg-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.corpus-token }}
        run: |
          git config --global submodule.recurse false
          git config --global fetch.recurseSubmodules false
          if [ -n "$GH_TOKEN" ]; then
            git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Build quality-gate from latest main
        if: steps.qg-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        env:
          GIT_SUBMODULE_STRATEGY: none
        run: |
          git clone --depth 1 --no-recurse-submodules https://github.com/jpurnell/quality-gate-swift.git /tmp/quality-gate-swift
          cd /tmp/quality-gate-swift
          swift build -c release 2>&1 | tee /tmp/qg-build.log | tail -20
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::quality-gate build failed (exit $BUILD_EXIT). Last 50 lines:"
            tail -50 /tmp/qg-build.log
            exit $BUILD_EXIT
          fi
          cp .build/release/quality-gate /usr/local/bin/
          echo "quality-gate built from $(git rev-parse --short HEAD)"

      - name: Checkout corpus
        if: inputs.corpus-repo != ''
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.corpus-token }}
        run: |
          git clone --depth 1 --branch ${{ inputs.corpus-branch }} \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ inputs.corpus-repo }}.git" \
            _corpus

      - name: Run quality gate
        id: qg-run
        timeout-minutes: 45
        run: |
          ARGS=""

          if [ -n "${{ inputs.checks }}" ]; then
            for check in ${{ inputs.checks }}; do
              ARGS="$ARGS --check $check"
            done
          fi

          if [ -n "${{ inputs.exclude }}" ]; then
            for exc in ${{ inputs.exclude }}; do
              ARGS="$ARGS --exclude $exc"
            done
          fi

          if [ -f "${{ inputs.config }}" ]; then
            ARGS="$ARGS --config ${{ inputs.config }}"
          fi

          if [ "${{ inputs.continue-on-failure }}" = "true" ]; then
            ARGS="$ARGS --continue-on-failure"
          fi

          if [ "${{ inputs.strict }}" = "true" ]; then
            ARGS="$ARGS --strict"
          fi

          # Write telemetry directly to corpus checkout if available
          if [ -d "_corpus" ]; then
            ARGS="$ARGS --telemetry-corpus-path $(pwd)/_corpus"
          fi

          echo "Running: quality-gate $ARGS"
          quality-gate $ARGS || echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Push telemetry to corpus
        if: inputs.corpus-repo != '' && always()
        timeout-minutes: 2
        run: |
          if [ ! -d "_corpus" ]; then
            echo "Corpus directory not found — skipping telemetry push."
            exit 0
          fi
          cd _corpus
          git config user.name "quality-gate[bot]"
          git config user.email "quality-gate[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No telemetry changes to commit."
            exit 0
          fi

          COMMIT_MSG="telemetry: ${{ github.repository }}@$(echo ${{ github.sha }} | cut -c1-7)"

          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            git commit -m "$COMMIT_MSG" || true
            if git push origin ${{ inputs.corpus-branch }}; then
              echo "Telemetry pushed successfully (attempt $attempt)."
              exit 0
            fi
            echo "Push conflict (attempt $attempt/$MAX_RETRIES), rebasing..."
            git pull --rebase origin ${{ inputs.corpus-branch }}
          done

          echo "::warning::Telemetry push failed after $MAX_RETRIES attempts."
          exit 0

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Quality Gate failure: ${{ github.repository }}"
          BODY="**Nightly quality gate failed** on $(date -u +%Y-%m-%d).

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}

          This issue was opened automatically by the quality-gate workflow."

          EXISTING=$(gh issue list --state open --search "in:title \"Quality Gate failure\"" --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Commented on existing issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "ci-failure"
            echo "Opened new failure issue"
          fi
